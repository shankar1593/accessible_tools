services:
  - type: web
    name: ba-ii-plus-accessible
    runtime: python
    plan: free
    rootDir: calculators/financial/ba-ii-plus
    buildCommand: pip install -r requirements.txt
    startCommand: gunicorn src.app:server --bind 0.0.0.0:$PORT
    envVars:
      - key: PYTHON_VERSION
        value: "3.12"
